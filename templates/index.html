<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow border-0">
                <div class="card-body p-4">

                    <h2 class="text-center mb-4">💼 Salary Prediction System</h2>

                    <form action="/predict" method="POST">

                        <!-- Numeric inputs -->
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Experience (Years)</label>
                                <input type="number" name="experience_years" class="form-control" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Skills Count</label>
                                <input type="number" name="skills_count" class="form-control" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Certifications</label>
                                <input type="number" name="certifications" class="form-control" required>
                            </div>
                        </div>

                        <!-- Job title -->
                        <div class="mb-3">
                            <label class="form-label">Job Title</label>
                            <input type="text" name="job_title" class="form-control" placeholder="e.g Data Scientist" required>
                        </div>

                        <!-- Education -->
                        <div class="mb-3">
                            <label class="form-label">Education Level</label>
                            <select name="education_level" class="form-select" required>
                                <option value="">Select</option>
                                <option>High School</option>
                                <option>Diploma</option>
                                <option>Bachelor</option>
                                <option>Master</option>
                                <option>PhD</option>
                            </select>
                        </div>

                        <!-- Industry -->
                        <div class="mb-3">
                            <label class="form-label">Industry</label>
                            <select name="industry" class="form-select" required>
                                <option value="">Select</option>
                                <option>Technology</option>
                                <option>Finance</option>
                                <option>Education</option>
                                <option>Government</option>
                                <option>Healthcare</option>
                                <option>Manufacturing</option>
                                <option>Media</option>
                                <option>Retail</option>
                                <option>Telecom</option>
                            </select>
                        </div>

                        <!-- Company size -->
                        <div class="mb-3">
                            <label class="form-label">Company Size</label>
                            <select name="company_size" class="form-select" required>
                                <option value="">Select</option>
                                <option>Startup</option>
                                <option>Small</option>
                                <option>Medium</option>
                                <option>Large</option>
                                <option>Enterprise</option>
                            </select>
                        </div>

                        <!-- Location -->
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <select name="location" class="form-select" required>
                                <option value="">Select</option>
                                <option>USA</option>
                                <option>UK</option>
                                <option>Canada</option>
                                <option>Germany</option>
                                <option>India</option>
                                <option>Netherlands</option>
                                <option>Singapore</option>
                                <option>Sweden</option>
                                <option>Remote</option>
                            </select>
                        </div>

                        <!-- Remote work -->
                        <div class="mb-4">
                            <label class="form-label">Remote Work</label>
                            <select name="remote_work" class="form-select" required>
                                <option value="">Select</option>
                                <option>No</option>
                                <option>Hybrid</option>
                                <option>Yes</option>
                            </select>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Predict Salary
                            </button>
                        </div>

                    </form>

                    {% if prediction_text %}
                    <div class="alert alert-success mt-4 text-center">
                        {{ prediction_text }}
                    </div>
                    {% endif %}

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
