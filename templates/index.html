<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salary Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">💼 Salary Prediction System</h2>

        <form action="/predict" method="POST">

            <!-- Numeric Inputs -->
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Experience (Years)</label>
                    <input type="number" name="experience_years" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Skills Count</label>
                    <input type="number" name="skills_count" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Certifications</label>
                    <input type="number" name="certifications" class="form-control" required>
                </div>
            </div>

            <!-- Education -->
            <div class="mb-3">
                <label>Education Level</label>
                <select class="form-select" onchange="setEducation(this.value)">
                    <option value="diploma">Diploma</option>
                    <option value="highschool">High School</option>
                    <option value="master">Master</option>
                    <option value="phd">PhD</option>
                </select>
            </div>

            <input type="hidden" name="edu_diploma" id="edu_diploma" value="1">
            <input type="hidden" name="edu_highschool" id="edu_highschool" value="0">
            <input type="hidden" name="edu_master" id="edu_master" value="0">
            <input type="hidden" name="edu_phd" id="edu_phd" value="0">

            <!-- Industry -->
            <div class="mb-3">
                <label>Industry</label>
                <select class="form-select" onchange="setIndustry(this.value)">
                    <option value="tech">Technology</option>
                    <option value="finance">Finance</option>
                    <option value="education">Education</option>
                    <option value="government">Government</option>
                    <option value="healthcare">Healthcare</option>
                    <option value="manufacturing">Manufacturing</option>
                    <option value="media">Media</option>
                    <option value="retail">Retail</option>
                    <option value="telecom">Telecom</option>
                </select>
            </div>

            <!-- Industry hidden -->
            <input type="hidden" name="ind_education" id="ind_education" value="0">
            <input type="hidden" name="ind_finance" id="ind_finance" value="0">
            <input type="hidden" name="ind_government" id="ind_government" value="0">
            <input type="hidden" name="ind_healthcare" id="ind_healthcare" value="0">
            <input type="hidden" name="ind_manufacturing" id="ind_manufacturing" value="0">
            <input type="hidden" name="ind_media" id="ind_media" value="0">
            <input type="hidden" name="ind_retail" id="ind_retail" value="0">
            <input type="hidden" name="ind_tech" id="ind_tech" value="1">
            <input type="hidden" name="ind_telecom" id="ind_telecom" value="0">

            <!-- Company Size -->
            <div class="mb-3">
                <label>Company Size</label>
                <select class="form-select" onchange="setCompany(this.value)">
                    <option value="large">Large</option>
                    <option value="medium">Medium</option>
                    <option value="small">Small</option>
                    <option value="startup">Startup</option>
                </select>
            </div>

            <input type="hidden" name="comp_large" id="comp_large" value="1">
            <input type="hidden" name="comp_medium" id="comp_medium" value="0">
            <input type="hidden" name="comp_small" id="comp_small" value="0">
            <input type="hidden" name="comp_startup" id="comp_startup" value="0">

            <!-- Location -->
            <div class="mb-3">
                <label>Location</label>
                <select class="form-select" onchange="setLocation(this.value)">
                    <option value="usa">USA</option>
                    <option value="uk">UK</option>
                    <option value="canada">Canada</option>
                    <option value="germany">Germany</option>
                    <option value="india">India</option>
                    <option value="netherlands">Netherlands</option>
                    <option value="singapore">Singapore</option>
                    <option value="sweden">Sweden</option>
                    <option value="remote">Remote</option>
                </select>
            </div>

            <!-- Location hidden -->
            <input type="hidden" name="loc_canada" id="loc_canada" value="0">
            <input type="hidden" name="loc_germany" id="loc_germany" value="0">
            <input type="hidden" name="loc_india" id="loc_india" value="0">
            <input type="hidden" name="loc_netherlands" id="loc_netherlands" value="0">
            <input type="hidden" name="loc_remote" id="loc_remote" value="0">
            <input type="hidden" name="loc_singapore" id="loc_singapore" value="0">
            <input type="hidden" name="loc_sweden" id="loc_sweden" value="0">
            <input type="hidden" name="loc_uk" id="loc_uk" value="0">
            <input type="hidden" name="loc_usa" id="loc_usa" value="1">

            <!-- Remote Work -->
            <div class="mb-3">
                <label>Remote Work</label>
                <select class="form-select" onchange="setRemote(this.value)">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <input type="hidden" name="remote_yes" id="remote_yes" value="1">
            <input type="hidden" name="remote_no" id="remote_no" value="0">

            <!-- Submit -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary w-50">Predict Salary</button>
            </div>

        </form>

        <!-- Result -->
        {% if prediction %}
        <div class="alert alert-success mt-4 text-center">
            {{ prediction }}
        </div>
        {% endif %}

    </div>
</div>

<!-- JS -->
<script>
function reset(ids){
    ids.forEach(id => document.getElementById(id).value = 0);
}

function setEducation(val){
    reset(["edu_diploma","edu_highschool","edu_master","edu_phd"]);
    document.getElementById("edu_"+val).value = 1;
}

function setIndustry(val){
    reset(["ind_education","ind_finance","ind_government","ind_healthcare","ind_manufacturing","ind_media","ind_retail","ind_tech","ind_telecom"]);
    document.getElementById("ind_"+val).value = 1;
}

function setCompany(val){
    reset(["comp_large","comp_medium","comp_small","comp_startup"]);
    document.getElementById("comp_"+val).value = 1;
}

function setLocation(val){
    reset(["loc_canada","loc_germany","loc_india","loc_netherlands","loc_remote","loc_singapore","loc_sweden","loc_uk","loc_usa"]);
    document.getElementById("loc_"+val).value = 1;
}

function setRemote(val){
    document.getElementById("remote_yes").value = (val === "yes") ? 1 : 0;
    document.getElementById("remote_no").value = (val === "no") ? 1 : 0;
}
</script>

</body>
</html>
